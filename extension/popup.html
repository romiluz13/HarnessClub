<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentConfig</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1f2937; }
    .header { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .content { padding: 16px; }
    .status { padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 12px; }
    .status.success { background: #ecfdf5; color: #065f46; }
    .status.warning { background: #fffbeb; color: #92400e; }
    .status.info { background: #eff6ff; color: #1e40af; }
    .status.error { background: #fef2f2; color: #991b1b; }
    .detected { padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 12px; }
    .detected .type { font-size: 10px; text-transform: uppercase; font-weight: 600; color: #6b7280; letter-spacing: 0.05em; }
    .detected .name { font-size: 13px; font-weight: 500; margin-top: 4px; }
    .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f3f4f6; color: #374151; margin-top: 8px; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
    .field input { width: 100%; padding: 8px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 13px; }
    .helper { font-size: 11px; color: #6b7280; margin-top: 8px; line-height: 1.5; }
    .footer { padding: 8px 16px; border-top: 1px solid #e5e7eb; text-align: center; }
    .footer a { font-size: 11px; color: #6b7280; text-decoration: none; }
    .footer a:hover { color: #2563eb; }
  </style>
</head>
<body>
  <div class="header">
    <h1>AgentConfig</h1>
  </div>
  <div class="content" id="content">
    <div class="status info">Loading...</div>
  </div>
  <div class="footer">
    <span>Configure a local or hosted AgentConfig instance</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
